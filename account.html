<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Your account and order history — AppleVault"
    />
    <title data-i18n="account.title">My Account — AppleVault</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/account.css" />
  </head>
  <body>
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <div class="nav__inner">
        <a href="index.html" class="nav__logo" aria-label="AppleVault Home">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 814 1000"
            fill="currentColor"
          >
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.3-81-105.6-207.9-105.6-328.5 0-193 125.3-295.8 248.3-295.8 65.5 0 120 43.4 161 43.4 39.5 0 101.1-46 176.2-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8.6 15.6 1.9 18.2 3.2.6 8.4 1.3 13.6 1.3 45.4 0 103.7-30.4 135.5-71.4z"
            />
          </svg>
          <span>AppleVault</span>
        </a>

        <div class="nav__links">
          <a href="index.html" class="nav__link" data-i18n="nav.home">Home</a>
          <a href="catalog.html" class="nav__link" data-i18n="nav.catalog"
            >Catalog</a
          >
        </div>

        <div class="nav__actions">
          <a
            href="cart.html"
            class="nav__cart-btn"
            data-i18n-aria="nav.cart"
            aria-label="Cart"
          >
            🛒
            <span class="nav__cart-badge" id="cart-badge">0</span>
          </a>
          <a
            href="login.html"
            class="nav__auth-link"
            id="auth-link"
            data-i18n="nav.login"
            >Sign In</a
          >
          <span
            class="nav__user-name"
            id="user-name"
            style="display: none"
          ></span>
          <a
            href="#"
            class="nav__auth-link"
            id="logout-btn"
            style="display: none"
            data-i18n="nav.logout"
            >Sign Out</a
          >

          <button
            class="nav__toggle"
            id="nav-toggle"
            aria-label="Menu"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>

      <div class="nav__mobile-menu" id="mobile-menu">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="catalog.html" data-i18n="nav.catalog">Catalog</a>
        <a href="cart.html" data-i18n="nav.cart">Cart</a>
        <a href="login.html" data-i18n="nav.login">Sign In</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="container account-page">
        <div id="account-container">
          <div class="loading-state">
            <div class="spinner spinner--lg"></div>
            <span class="loading-state__text" data-i18n="common.loading"
              >Loading...</span
            >
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/account.js"></script>
  </body>
</html>
