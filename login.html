<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to your AppleVault account" />
    <title data-i18n="auth.login_title">Sign In — AppleVault</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 814 1000'><path fill='%23333' d='M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.3-81-105.6-207.9-105.6-328.5 0-193 125.3-295.8 248.3-295.8 65.5 0 120 43.4 161 43.4 39.5 0 101.1-46 176.2-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8.6 15.6 1.9 18.2 3.2.6 8.4 1.3 13.6 1.3 45.4 0 103.7-30.4 135.5-71.4z'/></svg>"
    />
  </head>
  <body>
    <!-- ====== Navigation ====== -->
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <div class="nav__inner">
        <a href="index.html" class="nav__logo" aria-label="AppleVault Home">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 814 1000"
            fill="currentColor"
          >
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.3-81-105.6-207.9-105.6-328.5 0-193 125.3-295.8 248.3-295.8 65.5 0 120 43.4 161 43.4 39.5 0 101.1-46 176.2-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8.6 15.6 1.9 18.2 3.2.6 8.4 1.3 13.6 1.3 45.4 0 103.7-30.4 135.5-71.4z"
            />
          </svg>
          <span>AppleVault</span>
        </a>

        <div class="nav__links">
          <a href="index.html" class="nav__link" data-i18n="nav.home">Home</a>
          <a href="catalog.html" class="nav__link" data-i18n="nav.catalog"
            >Catalog</a
          >
          <a
            href="catalog.html?category=iphones"
            class="nav__link"
            data-i18n="nav.iphones"
            >iPhone</a
          >
          <a
            href="catalog.html?category=macbooks"
            class="nav__link"
            data-i18n="nav.macbooks"
            >Mac</a
          >
          <a
            href="catalog.html?category=accessories"
            class="nav__link"
            data-i18n="nav.accessories"
            >Accessories</a
          >
        </div>

        <div class="nav__actions">
          <a
            href="cart.html"
            class="nav__cart-btn"
            data-i18n-aria="nav.cart"
            aria-label="Cart"
          >
            🛒
            <span class="nav__cart-badge" id="cart-badge">0</span>
          </a>
          <a
            href="login.html"
            class="nav__auth-link"
            id="auth-link"
            data-i18n="nav.login"
            >Sign In</a
          >
          <span
            class="nav__user-name"
            id="user-name"
            style="display: none"
          ></span>
          <a
            href="#"
            class="nav__auth-link"
            id="logout-btn"
            style="display: none"
            data-i18n="nav.logout"
            >Sign Out</a
          >

          <button
            class="nav__toggle"
            id="nav-toggle"
            aria-label="Menu"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>

      <div class="nav__mobile-menu" id="mobile-menu">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="catalog.html" data-i18n="nav.catalog">Catalog</a>
        <a href="cart.html" data-i18n="nav.cart">Cart</a>
        <a href="login.html" data-i18n="nav.login">Sign In</a>
      </div>
    </nav>

    <!-- ====== Main Content ====== -->
    <main class="main-content">
      <div class="auth-page">
        <div class="auth-card">
          <div class="auth-card__header">
            <span class="auth-card__logo"
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                width="48"
                height="48"
                viewBox="0 0 814 1000"
                fill="currentColor"
              >
                <path
                  d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.3-81-105.6-207.9-105.6-328.5 0-193 125.3-295.8 248.3-295.8 65.5 0 120 43.4 161 43.4 39.5 0 101.1-46 176.2-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8.6 15.6 1.9 18.2 3.2.6 8.4 1.3 13.6 1.3 45.4 0 103.7-30.4 135.5-71.4z"
                /></svg
            ></span>
            <h1 class="auth-card__title" data-i18n="auth.login_title">
              Sign In
            </h1>
            <p class="auth-card__subtitle" data-i18n="auth.login_subtitle">
              Sign in to your AppleVault account
            </p>
          </div>

          <!-- Error Message -->
          <div class="auth-error" id="auth-error" role="alert"></div>

          <!-- Login Form -->
          <form class="auth-form" id="login-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="email" data-i18n="auth.email"
                >Email Address</label
              >
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                required
                autocomplete="email"
                data-i18n-placeholder="auth.email"
                placeholder="Email Address"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="password" data-i18n="auth.password"
                >Password</label
              >
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                required
                autocomplete="current-password"
                data-i18n-placeholder="auth.password"
                placeholder="Password"
              />
            </div>

            <div class="auth-form__options">
              <label class="auth-form__remember">
                <input type="checkbox" name="remember" />
                <span data-i18n="auth.remember_me">Remember me</span>
              </label>
              <a
                href="#"
                class="auth-form__forgot"
                data-i18n="auth.forgot_password"
                >Forgot password?</a
              >
            </div>

            <button
              type="submit"
              class="btn btn--primary auth-btn"
              data-i18n="auth.login_btn"
            >
              Sign In
            </button>
          </form>

          <!-- Footer -->
          <div class="auth-footer" style="margin-top: var(--space-xl)">
            <span data-i18n="auth.no_account">Don't have an account?</span>
            <a href="register.html" data-i18n="auth.create_one">Create one</a>
          </div>
        </div>
      </div>
    </main>

    <!-- Scripts (ES Modules) -->
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
